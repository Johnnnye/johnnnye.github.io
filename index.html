<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>John Emslie – Sound Designer & Composer</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<main class="container" id="app">

  <section class="hero">
    <h1 id="about-trigger">John Emslie</h1>
    <p class="role">Sound Designer & Composer</p>
  </section>

  <section class="categories">
    <div class="node picture-node" data-note="146.83" data-pan="-0.4" style="top:32%; left:30%;">
      <span class="dot"></span><span class="label">Picture</span>
    </div>

    <div class="node nonlinear-node" data-note="174.61" data-pan="0.35" style="top:50%; left:62%;">
      <span class="dot"></span><span class="label">Interactive</span>
    </div>

    <div class="node redesigns-node" data-note="196.00" data-pan="-0.15" style="top:68%; left:40%;">
      <span class="dot"></span><span class="label">Redesigns</span>
    </div>

    <div class="node music-node" data-note="220.00" data-pan="0.2" style="top:78%; left:58%;">
      <span class="dot"></span><span class="label">Music and Sound Art</span>
    </div>
  </section>

  <!-- CONTACT (safe, so audio doesn't crash) -->
  <footer class="contact">
    <a href="mailto:typesofapes@gmail.com" id="contact-email">Contact</a>
  </footer>

  <!-- ABOUT -->
  <div class="overlay hidden" id="about-overlay">
    <div class="overlay-content">
      <p>
        I work with sound as texture, space, and motion.<br><br>
        My focus is on interaction, restraint, and emotional clarity.
      </p>
      <button class="close" id="about-close">Close</button>
    </div>
  </div>

</main>

<!-- OVERLAYS (unchanged content trimmed for clarity) -->
<div class="picture-overlay hidden" id="picture-overlay">
  <button class="picture-close" id="picture-close">×</button>
</div>

<div class="picture-overlay hidden" id="nonlinear-overlay">
  <button class="picture-close">×</button>
</div>

<div class="picture-overlay hidden" id="redesigns-overlay">
  <button class="picture-close">×</button>
</div>

<div class="picture-overlay hidden" id="music-overlay">
  <button class="picture-close">×</button>
</div>

<script>

/* =========================
   SAFE AUDIO CORE
========================= */

let ctx, master;
let voices = [];

function initAudio() {
  if (ctx) return;

  ctx = new (window.AudioContext || window.webkitAudioContext)();

  master = ctx.createGain();
  master.gain.value = 0.9;
  master.connect(ctx.destination);

  document.querySelectorAll(".node").forEach(el => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.frequency.value = parseFloat(el.dataset.note);
    gain.gain.value = 0;

    osc.connect(gain);
    gain.connect(master);
    osc.start();

    voices.push({ el, gain });
  });
}

document.addEventListener("click", () => {
  if (!ctx) initAudio();
  if (ctx.state === "suspended") ctx.resume();
}, { once: true });

/* =========================
   SAFE INTERACTIONS
========================= */

document.querySelectorAll(".node").forEach(el => {
  el.addEventListener("mouseenter", () => {
    const v = voices.find(x => x.el === el);
    if (v) v.gain.gain.setTargetAtTime(0.1, ctx.currentTime, 0.3);
  });

  el.addEventListener("mouseleave", () => {
    const v = voices.find(x => x.el === el);
    if (v) v.gain.gain.setTargetAtTime(0, ctx.currentTime, 0.5);
  });
});

/* =========================
   OVERLAYS (ROBUST)
========================= */

function bindOverlay(nodeSelector, overlayId) {
  const node = document.querySelector(nodeSelector);
  const overlay = document.getElementById(overlayId);
  const close = overlay?.querySelector(".picture-close");

  if (!node || !overlay) return;

  node.addEventListener("click", () => {
    overlay.classList.remove("hidden");
  });

  close?.addEventListener("click", () => {
    overlay.classList.add("hidden");
  });
}

bindOverlay(".picture-node", "picture-overlay");
bindOverlay(".nonlinear-node", "nonlinear-overlay");
bindOverlay(".redesigns-node", "redesigns-overlay");
bindOverlay(".music-node", "music-overlay");

/* =========================
   ABOUT (SAFE)
========================= */

const titleEl = document.getElementById("about-trigger");
const aboutOverlay = document.getElementById("about-overlay");
const aboutClose = document.getElementById("about-close");

titleEl?.addEventListener("click", () => {
  aboutOverlay?.classList.remove("hidden");
});

aboutClose?.addEventListener("click", () => {
  aboutOverlay?.classList.add("hidden");
});

</script>

</body>
</html>
